name: Deploy a cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: mx126.hostgator.mx
          username: twistedp
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            cd /tmp
            rm -rf twisted-media-web-main site.zip
            curl -sL https://github.com/salvador-oss/twisted-media-web/archive/refs/heads/main.zip -o site.zip
            unzip -qo site.zip
            cp -rf twisted-media-web-main/. /home3/twistedp/public_html/
            rm -rf twisted-media-web-main site.zip
            echo "Deploy completado OK"
