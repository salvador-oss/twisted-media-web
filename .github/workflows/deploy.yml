name: Deploy a cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via rsync SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='.cpanel.yml' --exclude='deploy.sh'
          path: ./
          remote_path: /home3/twistedp/public_html/
          remote_host: mx126.hostgator.mx
          remote_user: twistedp
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
