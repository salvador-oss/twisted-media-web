name: Deploy a cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: mx126.hostgator.mx
          username: twistedp
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home3/twistedp/twisted-media-web
            git fetch --all
            git reset --hard origin/main
            cp -rf /home3/twistedp/twisted-media-web/. /home3/twistedp/public_html/
            echo "Deploy completado OK"
